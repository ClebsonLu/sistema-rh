{% extends "base.html" %}
{% block title %}{% if avaliacao %}Editar{% else %}Nova{% endif %} Avaliacao - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-clipboard-check"></i> {% if avaliacao %}Editar{% else %}Nova{% endif %} Avaliacao</h4>
</div>
<div class="card" style="max-width: 700px;">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Funcionario *</label>
                    <select class="form-select" name="funcionario_id" required>
                        <option value="">Selecione...</option>
                        {% for f in funcionarios %}
                        <option value="{{ f.id }}" {{ 'selected' if avaliacao and avaliacao.funcionario_id == f.id }}>{{ f.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Avaliador *</label>
                    <select class="form-select" name="avaliador_id" required>
                        <option value="">Selecione...</option>
                        {% for f in funcionarios %}
                        <option value="{{ f.id }}" {{ 'selected' if avaliacao and avaliacao.avaliador_id == f.id }}>{{ f.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Periodo *</label>
                    <input type="text" class="form-control" name="periodo" value="{{ avaliacao.periodo if avaliacao else '' }}" placeholder="Ex: 2024-T1" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nota Geral (0-10)</label>
                    <input type="number" step="0.1" min="0" max="10" class="form-control" name="nota_geral" value="{{ avaliacao.nota_geral if avaliacao else '0' }}">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Competencias</label>
                <textarea class="form-control" name="competencias" rows="3" placeholder="Lideranca, Comunicacao, Trabalho em Equipe...">{{ avaliacao.competencias if avaliacao else '' }}</textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Observacoes</label>
                <textarea class="form-control" name="observacoes" rows="3">{{ avaliacao.observacoes if avaliacao else '' }}</textarea>
            </div>
            {% if avaliacao %}
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    <option value="Pendente" {{ 'selected' if avaliacao.status == 'Pendente' }}>Pendente</option>
                    <option value="Concluida" {{ 'selected' if avaliacao.status == 'Concluida' }}>Concluida</option>
                </select>
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="{{ url_for('avaliacoes.listar') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
