{% extends "base.html" %}
{% block title %}Solicitar Ferias{% endblock %}
{% block content %}
<h2 class="mb-3">Solicitar Ferias</h2>
<form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Funcionario *</label>
        <select name="funcionario_id" class="form-select" required>
            {% for f in funcionarios %}<option value="{{ f.id }}">{{ f.nome }}</option>{% endfor %}
        </select></div>
    <div class="col-md-3"><label class="form-label">Data Inicio *</label>
        <input type="date" name="data_inicio" class="form-control" required></div>
    <div class="col-md-3"><label class="form-label">Data Fim *</label>
        <input type="date" name="data_fim" class="form-control" required></div>
    <div class="col-12"><label class="form-label">Motivo</label>
        <textarea name="motivo" class="form-control"></textarea></div>
    <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Solicitar</button>
        <a href="{{ url_for('ferias.listar') }}" class="btn btn-secondary">Cancelar</a></div>
</form>
{% endblock %}
