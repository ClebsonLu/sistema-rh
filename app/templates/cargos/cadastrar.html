{% extends "base.html" %}
{% block title %}Cargo{% endblock %}
{% block content %}
<h2 class="mb-3">{{ "Editar" if cargo else "Cadastrar" }} Cargo</h2>
<form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Nome *</label>
        <input type="text" name="nome" class="form-control" value="{{ cargo.nome if cargo else '' }}" required></div>
    <div class="col-md-6"><label class="form-label">Departamento *</label>
        <select name="departamento_id" class="form-select" required>
            {% for d in departamentos %}<option value="{{ d.id }}" {{ 'selected' if cargo and cargo.departamento_id == d.id }}>{{ d.nome }}</option>{% endfor %}
        </select></div>
    <div class="col-md-6"><label class="form-label">Descricao</label>
        <textarea name="descricao" class="form-control">{{ cargo.descricao if cargo else '' }}</textarea></div>
    <div class="col-md-6"><label class="form-label">Salario Base</label>
        <input type="number" step="0.01" name="salario_base" class="form-control" value="{{ cargo.salario_base if cargo else 0 }}"></div>
    <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Salvar</button>
        <a href="{{ url_for('cargos.listar') }}" class="btn btn-secondary">Cancelar</a></div>
</form>
{% endblock %}
