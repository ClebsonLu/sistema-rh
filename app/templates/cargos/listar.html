{% extends "base.html" %}
{% block title %}Cargos{% endblock %}
{% block content %}
<div class="d-flex justify-content-between mb-3">
    <h2>Cargos</h2>
    <a href="{{ url_for('cargos.cadastrar') }}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> Novo</a>
</div>
<table class="table table-striped table-hover">
    <thead class="table-dark"><tr><th>Nome</th><th>Departamento</th><th>Salario Base</th><th>Acoes</th></tr></thead>
    <tbody>
    {% for c in cargos %}
    <tr>
        <td>{{ c.nome }}</td>
        <td>{{ c.departamento.nome }}</td>
        <td>R$ {{ "%.2f"|format(c.salario_base) }}</td>
        <td>
            <a href="{{ url_for('cargos.editar', id=c.id) }}" class="btn btn-sm btn-warning"><i class="bi bi-pencil"></i></a>
            <form method="post" action="{{ url_for('cargos.excluir', id=c.id) }}" class="d-inline" onsubmit="return confirm('Excluir este cargo?')">
                <button class="btn btn-sm btn-danger"><i class="bi bi-trash"></i></button>
            </form>
        </td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock %}
