{% extends "base.html" %}
{% block title %}Novo Candidato - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-person-plus"></i> Novo Candidato</h4>
</div>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" name="nome" required>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Telefone</label>
                    <input type="text" class="form-control" name="telefone">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Vaga *</label>
                <select class="form-select" name="vaga_id" required>
                    <option value="">Selecione...</option>
                    {% for v in vagas %}
                    <option value="{{ v.id }}">{{ v.titulo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Observacoes</label>
                <textarea class="form-control" name="observacoes" rows="3"></textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Cadastrar</button>
            <a href="{{ url_for('recrutamento.listar_candidatos') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
