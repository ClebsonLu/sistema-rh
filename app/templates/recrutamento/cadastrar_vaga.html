{% extends "base.html" %}
{% block title %}Cadastrar Vaga - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-briefcase"></i> Nova Vaga</h4>
</div>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Titulo *</label>
                <input type="text" class="form-control" name="titulo" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descricao</label>
                <textarea class="form-control" name="descricao" rows="3"></textarea>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Departamento *</label>
                    <select class="form-select" name="departamento_id" required>
                        <option value="">Selecione...</option>
                        {% for d in departamentos %}
                        <option value="{{ d.id }}">{{ d.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Cargo *</label>
                    <select class="form-select" name="cargo_id" required>
                        <option value="">Selecione...</option>
                        {% for c in cargos %}
                        <option value="{{ c.id }}">{{ c.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Salario Oferecido (R$)</label>
                <input type="number" step="0.01" class="form-control" name="salario_oferecido" value="0">
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Criar Vaga</button>
            <a href="{{ url_for('recrutamento.listar_vagas') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
