{% extends "base.html" %}
{% block title %}Editar Funcionario{% endblock %}
{% block content %}
<h2 class="mb-3">Editar Funcionario</h2>
<form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Nome *</label><input type="text" name="nome" class="form-control" value="{{ funcionario.nome }}" required></div>
    <div class="col-md-3"><label class="form-label">CPF *</label><input type="text" name="cpf" class="form-control" value="{{ funcionario.cpf }}" required></div>
    <div class="col-md-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ funcionario.email or '' }}"></div>
    <div class="col-md-3"><label class="form-label">Telefone</label><input type="text" name="telefone" class="form-control" value="{{ funcionario.telefone or '' }}"></div>
    <div class="col-md-3"><label class="form-label">Data Nascimento</label><input type="date" name="data_nascimento" class="form-control" value="{{ funcionario.data_nascimento }}"></div>
    <div class="col-md-3"><label class="form-label">Data Admissao *</label><input type="date" name="data_admissao" class="form-control" value="{{ funcionario.data_admissao }}" required></div>
    <div class="col-md-3"><label class="form-label">Departamento *</label>
        <select name="departamento_id" class="form-select" required>
            {% for d in departamentos %}<option value="{{ d.id }}" {{ 'selected' if d.id == funcionario.departamento_id }}>{{ d.nome }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-3"><label class="form-label">Cargo *</label>
        <select name="cargo_id" class="form-select" required>
            {% for c in cargos %}<option value="{{ c.id }}" {{ 'selected' if c.id == funcionario.cargo_id }}>{{ c.nome }}</option>{% endfor %}
        </select>
    </div>
    <div class="col-md-3"><label class="form-label">Salario</label><input type="number" step="0.01" name="salario" class="form-control" value="{{ funcionario.salario }}"></div>
    <div class="col-md-3"><label class="form-label">Status</label>
        <select name="status" class="form-select">
            <option value="Ativo" {{ 'selected' if funcionario.status == 'Ativo' }}>Ativo</option>
            <option value="Inativo" {{ 'selected' if funcionario.status == 'Inativo' }}>Inativo</option>
        </select>
    </div>
    <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-check-circle"></i> Atualizar</button>
        <a href="{{ url_for('funcionarios.detalhes', id=funcionario.id) }}" class="btn btn-secondary">Cancelar</a></div>
</form>
{% endblock %}
