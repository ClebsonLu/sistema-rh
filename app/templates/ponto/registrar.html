{% extends "base.html" %}
{% block title %}Registrar Ponto{% endblock %}
{% block content %}
<h2 class="mb-3">Registrar Ponto</h2>
<form method="post" class="row g-3">
    <div class="col-md-6"><label class="form-label">Funcionario *</label>
        <select name="funcionario_id" class="form-select" required>
            {% for f in funcionarios %}<option value="{{ f.id }}">{{ f.nome }}</option>{% endfor %}
        </select></div>
    <div class="col-md-6"><label class="form-label">Observacao</label>
        <input type="text" name="observacao" class="form-control"></div>
    <div class="col-12"><button type="submit" class="btn btn-primary"><i class="bi bi-clock"></i> Registrar</button>
        <a href="{{ url_for('ponto.historico') }}" class="btn btn-secondary">Historico</a></div>
</form>
{% endblock %}
