{% extends "base.html" %}
{% block title %}{% if treinamento %}Editar{% else %}Cadastrar{% endif %} Treinamento - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-mortarboard"></i> {% if treinamento %}Editar{% else %}Novo{% endif %} Treinamento</h4>
</div>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Titulo *</label>
                <input type="text" class="form-control" name="titulo" value="{{ treinamento.titulo if treinamento else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Descricao</label>
                <textarea class="form-control" name="descricao" rows="3">{{ treinamento.descricao if treinamento else '' }}</textarea>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Carga Horaria (h)</label>
                    <input type="number" class="form-control" name="carga_horaria" value="{{ treinamento.carga_horaria if treinamento else '0' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Data Inicio</label>
                    <input type="date" class="form-control" name="data_inicio" value="{{ treinamento.data_inicio.strftime('%Y-%m-%d') if treinamento else '' }}">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Data Fim</label>
                    <input type="date" class="form-control" name="data_fim" value="{{ treinamento.data_fim.strftime('%Y-%m-%d') if treinamento and treinamento.data_fim else '' }}">
                </div>
            </div>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Local</label>
                    <input type="text" class="form-control" name="local" value="{{ treinamento.local if treinamento else '' }}">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Vagas Maximas</label>
                    <input type="number" class="form-control" name="vagas_max" value="{{ treinamento.vagas_max if treinamento else '30' }}">
                </div>
            </div>
            {% if treinamento %}
            <div class="mb-3">
                <label class="form-label">Status</label>
                <select class="form-select" name="status">
                    {% for s in ["Aberto","Em_Andamento","Concluido","Cancelado"] %}
                    <option value="{{ s }}" {{ 'selected' if treinamento.status == s }}>{{ s }}</option>
                    {% endfor %}
                </select>
            </div>
            {% endif %}
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="{{ url_for('treinamentos.listar') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
