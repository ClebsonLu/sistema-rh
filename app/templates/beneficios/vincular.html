{% extends "base.html" %}
{% block title %}Vincular Beneficio - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-link"></i> Vincular Beneficio a Funcionario</h4>
</div>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Funcionario *</label>
                <select class="form-select" name="funcionario_id" required>
                    <option value="">Selecione...</option>
                    {% for f in funcionarios %}
                    <option value="{{ f.id }}">{{ f.nome }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Beneficio *</label>
                <select class="form-select" name="beneficio_id" required>
                    <option value="">Selecione...</option>
                    {% for b in beneficios %}
                    <option value="{{ b.id }}">{{ b.nome }} - R$ {{ "%.2f"|format(b.valor_padrao) }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Valor (R$)</label>
                <input type="number" step="0.01" class="form-control" name="valor" value="0">
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Vincular</button>
            <a href="{{ url_for('beneficios.listar') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
