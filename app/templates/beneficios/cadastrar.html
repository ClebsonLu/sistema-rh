{% extends "base.html" %}
{% block title %}{% if beneficio %}Editar{% else %}Cadastrar{% endif %} Beneficio - Sistema RH{% endblock %}
{% block content %}
<div class="page-header">
    <h4><i class="bi bi-gift"></i> {% if beneficio %}Editar{% else %}Cadastrar{% endif %} Beneficio</h4>
</div>
<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Nome *</label>
                <input type="text" class="form-control" name="nome" value="{{ beneficio.nome if beneficio else '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Tipo</label>
                <select class="form-select" name="tipo">
                    {% for t in ["VR","VT","Saude","Odontologico","Seguro","Outro"] %}
                    <option value="{{ t }}" {{ 'selected' if beneficio and beneficio.tipo == t }}>{{ t }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Valor Padrao (R$)</label>
                <input type="number" step="0.01" class="form-control" name="valor_padrao" value="{{ beneficio.valor_padrao if beneficio else '0' }}">
            </div>
            <div class="mb-3">
                <label class="form-label">Descricao</label>
                <textarea class="form-control" name="descricao" rows="3">{{ beneficio.descricao if beneficio else '' }}</textarea>
            </div>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Salvar</button>
            <a href="{{ url_for('beneficios.listar') }}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
